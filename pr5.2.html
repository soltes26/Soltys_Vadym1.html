<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Створення поста</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, textarea { display: block; margin: 10px 0; width: 300px; }
  </style>
</head>
<body>

<h2>Створити пост</h2>

<form id="postForm">
  <input type="text" id="title" placeholder="Заголовок">
  <textarea id="body" placeholder="Текст поста"></textarea>
  <button type="submit">Відправити</button>
</form>

<p id="error" style="color:red;"></p>

<script>
const form = document.getElementById("postForm");
const titleInput = document.getElementById("title");
const bodyInput = document.getElementById("body");
const error = document.getElementById("error");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const title = titleInput.value.trim();
  const body = bodyInput.value.trim();

  if (!title || !body) {
    error.textContent = "Заповніть всі поля!";
    return;
  }

  error.textContent = "";

  try {
    const response = await fetch("https://jsonplaceholder.typicode.com/posts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title: title,
        body: body,
        userId: 1
      })
    });

    if (!response.ok) {
      throw new Error("Помилка запиту");
    }

    const data = await response.json();

    console.log("Відповідь сервера:", data);

    form.reset();

  } catch (err) {
    error.textContent = "Помилка відправки!";
    console.error(err);
  }
});
</script>

</body>
</html>
