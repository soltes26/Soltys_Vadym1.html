<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота</title>
</head>
<body>

<h1>Практична робота 3</h1>

<script>

// ВАРІАНТ 1

console.log("=== Варіант 1 ===");

const numbers = [5, 12, 8, 3, 20];

const sum = numbers.reduce((a, b) => a + b, 0);
const average = sum / numbers.length;

const max = Math.max(...numbers);
const min = Math.min(...numbers);

const sorted = [...numbers].sort((a, b) => a - b);

console.log("Масив:", numbers);
console.log("Середнє:", average);
console.log("Максимум:", max);
console.log("Мінімум:", min);
console.log("Відсортований:", sorted);


// ВАРІАНТ 2

console.log("=== Варіант 2 ===");

const users = [
  { name: "Іван", age: 20 },
  { name: "Оля", age: 17 },
  { name: "Петро", age: 25 }
];

const adults = users.filter(user => user.age > 18);
const names = users.map(user => user.name);
const avgAge = users.reduce((sum, user) => sum + user.age, 0) / users.length;

console.log("Дорослі:", adults);
console.log("Імена:", names);
console.log("Середній вік:", avgAge);


// ВАРІАНТ 3

console.log("=== Варіант 3 ===");

const products = [
  { name: "Ноутбук", category: "Техніка" },
  { name: "Телефон", category: "Техніка" },
  { name: "Хліб", category: "Їжа" }
];

const grouped = products.reduce((acc, product) => {
  if (!acc[product.category]) {
    acc[product.category] = [];
  }
  acc[product.category].push(product.name);
  return acc;
}, {});

console.log("Групи:", grouped);


// ВАРІАНТ 4

console.log("=== Варіант 4 ===");

const students = [
  { name: "Іван", grades: [80, 90, 70] },
  { name: "Оля", grades: [85, 95, 100] }
];

students.forEach(student => {
  const avg = student.grades.reduce((a, b) => a + b, 0) / student.grades.length;
  console.log(student.name + ": " + avg);
});


// ВАРІАНТ 5

console.log("=== Варіант 5 ===");

const namesArr = ["Іван", "Оля", "Петро"];

const result = {};

namesArr.forEach(name => {
  result[name] = name.length;
});

console.log("Об'єкт:", result);

</script>

</body>
</html>
