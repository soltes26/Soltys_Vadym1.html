<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Список</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    li { cursor: pointer; margin: 5px 0; }
    button { margin: 5px; }
  </style>
</head>
<body>

<h2>Динамічний список</h2>

<input type="text" id="itemInput" placeholder="Введіть текст">
<button id="addBtn">Додати</button>
<button id="sortBtn">Сортувати</button>

<ul id="list"></ul>

<p id="error" style="color:red;"></p>

<script>
const input = document.getElementById("itemInput");
const addBtn = document.getElementById("addBtn");
const sortBtn = document.getElementById("sortBtn");
const list = document.getElementById("list");
const error = document.getElementById("error");

addBtn.addEventListener("click", () => {
  const value = input.value.trim();

  if (value === "") {
    error.textContent = "Поле не може бути порожнім!";
    return;
  }

  error.textContent = "";

  const li = document.createElement("li");
  li.textContent = value;

  li.addEventListener("click", () => {
    li.remove();
  });

  list.appendChild(li);
  input.value = "";
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    addBtn.click();
  }
});

sortBtn.addEventListener("click", () => {
  const items = Array.from(list.children);

  items.sort((a, b) => a.textContent.localeCompare(b.textContent));

  list.innerHTML = "";
  items.forEach(item => list.appendChild(item));
});
</script>

</body>
</html>
